<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — EventAI</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <i class="ti ti-map-pin"></i>
      <span>event<strong>ai</strong></span>
    </div>
    <div class="nav-links">
      <a href="index.html">Find events</a>
      <a href="venue.html">For venues</a>
      <a href="login.html" class="active">Login</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Venue login</h2>

      <div class="alert alert-error" id="error-msg"></div>
      <div class="alert alert-success" id="success-msg"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn btn-primary" onclick="handleLogin()" style="width:100%;justify-content:center">
        <i class="ti ti-login"></i> Login
      </button>

      <p class="auth-link">
        Don't have an account? <a href="register.html">Register your venue</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        await API.signIn(email, password);
        successMsg.textContent = 'Login successful! Redirecting...';
        successMsg.style.display = 'block';
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        errorMsg.textContent = 'Invalid email or password.';
        errorMsg.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>

</body>
</html>

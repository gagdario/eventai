<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register your venue — EventAI</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <i class="ti ti-map-pin"></i>
      <span>event<strong>ai</strong></span>
    </div>
    <div class="nav-links">
      <a href="index.html">Find events</a>
      <a href="venue.html">For venues</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Register your venue</h2>
      <p style="font-size:13px;color:var(--text-muted)">Free for the first 3 months. No credit card required.</p>

      <div class="alert alert-error" id="error-msg"></div>
      <div class="alert alert-success" id="success-msg"></div>

      <div class="form-group">
        <label>Venue name</label>
        <input type="text" id="venue-name" placeholder="e.g. Frida Kahlo Café" />
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>City</label>
          <input type="text" id="city" placeholder="e.g. Milan" />
        </div>
        <div class="form-group">
          <label>Neighborhood</label>
          <input type="text" id="neighborhood" placeholder="e.g. Navigli" />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="min. 8 characters" />
      </div>

      <button class="btn btn-primary" onclick="handleRegister()" style="width:100%;justify-content:center">
        <i class="ti ti-building-store"></i> Register venue
      </button>

      <p class="auth-link">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    async function handleRegister() {
      const venueName = document.getElementById('venue-name').value.trim();
      const city = document.getElementById('city').value.trim();
      const neighborhood = document.getElementById('neighborhood').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!venueName || !city || !email || !password) {
        errorMsg.textContent = 'Please fill in all required fields.';
        errorMsg.style.display = 'block';
        return;
      }

      if (password.length < 8) {
        errorMsg.textContent = 'Password must be at least 8 characters.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        await API.signUp(email, password, venueName, city, neighborhood);
        successMsg.textContent = 'Account created! Check your email to confirm your address, then login.';
        successMsg.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 3000);
      } catch (err) {
        errorMsg.textContent = err.message || 'Registration failed. Please try again.';
        errorMsg.style.display = 'block';
      }
    }
  </script>

</body>
</html>
